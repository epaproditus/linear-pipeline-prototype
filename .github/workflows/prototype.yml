# Pipeline stage: PROTOTYPE — Sandbox Flows, Seed Data Agent
# Triggered by dispatcher-service via GitHub repository_dispatch
# when a Linear issue enters the PROTOTYPE state (pipeline-stage=prototype).
# Runs two parallel jobs: sandbox exploration and data seeding.
name: Pipeline — PROTOTYPE Stage (Sandbox + Seed Data)

on:
  repository_dispatch:
    types: [linear-issue]

env:
  LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}

jobs:
  sandbox-agent:
    # Only run for issues entering the PROTOTYPE state
    if: github.event.client_payload.state == 'prototype'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ISSUE_ID: ${{ github.event.client_payload.issue_id }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Hermes
        run: |
          for i in 1 2 3; do
            if command -v hermes &>/dev/null; then break; fi
            curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash && break
            sleep 2
          done
          hermes --version

      - name: Install sandbox-agent skill
        run: |
          mkdir -p ~/.hermes/skills/sandbox-agent
          cp .agents/skills/prototype/sandbox-agent.md ~/.hermes/skills/sandbox-agent/SKILL.md

      - name: Run sandbox-agent
        id: sandbox
        run: |
          hermes -s sandbox-agent chat \
            -q "Run sandbox prototyping for issue ${{ env.ISSUE_ID }}" \
            --yolo 2>&1 | tee sandbox-output.txt

      - name: Upload sandbox artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prototype-sandbox
          path: |
            sandbox-output.txt
            sandbox/
          retention-days: 7

  seed-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ISSUE_ID: ${{ github.event.client_payload.issue_id }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Hermes
        run: |
          for i in 1 2 3; do
            if command -v hermes &>/dev/null; then break; fi
            curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash && break
            sleep 2
          done
          hermes --version

      - name: Install seed-data skill
        run: |
          mkdir -p ~/.hermes/skills/seed-data
          cp .agents/skills/prototype/seed-data.md ~/.hermes/skills/seed-data/SKILL.md

      - name: Run seed-data
        id: seed
        run: |
          hermes -s seed-data chat \
            -q "Generate seed data for issue ${{ env.ISSUE_ID }}" \
            --yolo 2>&1 | tee seed-output.txt

      - name: Upload seed-data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prototype-seed-data
          path: |
            seed-output.txt
            seed/
          retention-days: 7
