# Pipeline stage: PLAN — Ticket Triage → Feedback Digest → PRD Outline
# Triggered by dispatcher-service via GitHub repository_dispatch
# when a Linear issue enters the Ready state (after router triage).
# Runs three PLAN substeps sequentially, each posting a Linear comment.
name: Pipeline — PLAN Stage (Triage → Digest → PRD)

on:
  repository_dispatch:
    types: [linear-issue]

jobs:
  ticket-triage:
    # Only run for issues entering the Ready state (after router triage)
    if: github.event.client_payload.state == 'ready'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      ISSUE_ID: ${{ github.event.client_payload.issue_id }}
      ISSUE_STATE: ${{ github.event.client_payload.state }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Install Hermes
        run: |
          if ! command -v hermes &>/dev/null; then
            curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          fi
          hermes --version

      - name: Install ticket-triage skill
        run: |
          mkdir -p ~/.hermes/skills/ticket-triage
          cp repo/.agents/skills/plan/ticket-triage.md ~/.hermes/skills/ticket-triage/SKILL.md
          hermes skills list 2>/dev/null | grep ticket-triage || echo "Skill installed (name: ticket-triage)"

      - name: Run ticket-triage
        id: triage
        run: |
          hermes -s ticket-triage chat \
            -q "Run deep ticket triage on issue ${{ env.ISSUE_ID }}" \
            --yolo 2>&1 | tee plan-triage-output.txt

      - name: Capture ticket-triage result
        if: always()
        run: |
          echo "=== Ticket Triage output ==="
          cat plan-triage-output.txt
          echo "=== Done ==="
          
      - name: Upload ticket-triage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-ticket-triage
          path: plan-triage-output.txt
          retention-days: 7

  feedback-digest:
    needs: ticket-triage
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      ISSUE_ID: ${{ github.event.client_payload.issue_id }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Install Hermes
        run: |
          if ! command -v hermes &>/dev/null; then
            curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          fi
          hermes --version

      - name: Install feedback-digest skill
        run: |
          mkdir -p ~/.hermes/skills/feedback-digest
          cp repo/.agents/skills/plan/feedback-digest.md ~/.hermes/skills/feedback-digest/SKILL.md
          hermes skills list 2>/dev/null | grep feedback-digest || echo "Skill installed (name: feedback-digest)"

      - name: Run feedback-digest
        id: digest
        run: |
          hermes -s feedback-digest chat \
            -q "Digest feedback and extract requirements for issue ${{ env.ISSUE_ID }}" \
            --yolo 2>&1 | tee plan-digest-output.txt

      - name: Capture feedback-digest result
        if: always()
        run: |
          echo "=== Feedback Digest output ==="
          cat plan-digest-output.txt
          echo "=== Done ==="
          
      - name: Upload feedback-digest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-feedback-digest
          path: plan-digest-output.txt
          retention-days: 7

  prd-outline:
    needs: feedback-digest
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      ISSUE_ID: ${{ github.event.client_payload.issue_id }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Install Hermes
        run: |
          if ! command -v hermes &>/dev/null; then
            curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          fi
          hermes --version

      - name: Install prd-outline skill
        run: |
          mkdir -p ~/.hermes/skills/prd-outline
          cp repo/.agents/skills/plan/prd-outline.md ~/.hermes/skills/prd-outline/SKILL.md
          hermes skills list 2>/dev/null | grep prd-outline || echo "Skill installed (name: prd-outline)"

      - name: Run prd-outline
        id: prd
        run: |
          hermes -s prd-outline chat \
            -q "Generate PRD outline for issue ${{ env.ISSUE_ID }}" \
            --yolo 2>&1 | tee plan-prd-output.txt

      - name: Capture prd-outline result
        if: always()
        run: |
          echo "=== PRD Outline output ==="
          cat plan-prd-output.txt
          echo "=== Done ==="
          
      - name: Upload prd-outline artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-prd-outline
          path: plan-prd-output.txt
          retention-days: 7
